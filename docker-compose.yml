version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: kairon_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: kairon_therapy
      MYSQL_USER: kairon
      MYSQL_PASSWORD: kairon123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema_mysql.sql:/docker-entrypoint-initdb.d/schema_mysql.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: node:20-alpine
    container_name: kairon_api
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: kairon
      DB_PASSWORD: kairon123
      DB_NAME: kairon_therapy
      PORT: 3000
    depends_on:
      mysql:
        condition: service_healthy
    command: sh -c "npm install && npm run dev"

volumes:
  mysql_data:
